<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>統計報表</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <main class="flex-grow-1 p-4">
        <h4 class="mb-3">📊 統計報表</h4>

        <!-- 手動觸發統計計算 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header fw-semibold">手動觸發統計計算</div>
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-auto">
                        <label class="form-label">統計類型</label>
                        <select class="form-select" id="calcType">
                            <option value="USER">USER（依使用者）</option>
                            <option value="CATEGORY">CATEGORY（依分類）</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <label class="form-label">日期</label>
                        <input type="date" class="form-control" id="calcDate">
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-success" onclick="triggerCalculate()">▶ 執行計算</button>
                    </div>
                </div>
                <div id="calcResult" class="mt-3"></div>
            </div>
        </div>

        <!-- 查詢統計結果 -->
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-semibold">統計結果列表</span>
                <div class="d-flex gap-2">
                    <input type="date" class="form-control form-control-sm" id="filterDate" style="width:160px">
                    <button class="btn btn-sm btn-outline-secondary" onclick="applyDateFilter()">篩選</button>
                    <button class="btn btn-sm btn-link text-secondary" onclick="clearFilter()">清除</button>
                </div>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>日期</th>
                            <th>類型</th>
                            <th>金額</th>
                            <th>描述</th>
                        </tr>
                    </thead>
                    <tbody id="stats-tbody">
                        <tr><td colspan="5" class="text-center py-4 text-muted">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 分頁 -->
        <nav class="mt-3" id="pagination-container"></nav>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/sidebar :: sidebar-active}"></script>
<script>
    let currentPage = 0;
    let currentDate = null;

    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', ...options });
        if (res.status === 401) { location.href = '/login'; return null; }
        return res;
    }

    async function loadStats(page = 0) {
        currentPage = page;
        let url = currentDate
            ? `/api/statistics?date=${currentDate}&page=${page}&size=20`
            : `/api/statistics?page=${page}&size=20`;
        const res = await apiFetch(url);
        if (!res) return;
        const data = await res.json();
        renderTable(data);
        renderPagination(data);
    }

    function renderTable(data) {
        const tbody = document.getElementById('stats-tbody');
        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">無資料</td></tr>';
            return;
        }
        tbody.innerHTML = data.content.map((s, i) => `
            <tr>
                <td>${data.number * data.size + i + 1}</td>
                <td>${s.date || ''}</td>
                <td><span class="badge bg-primary">${escHtml(s.type || '')}</span></td>
                <td class="text-end fw-semibold">$${(s.amount || s.total || s.value || 0).toLocaleString()}</td>
                <td>${escHtml(s.description || s.label || s.name || '—')}</td>
            </tr>`).join('');
    }

    function renderPagination(data) {
        const container = document.getElementById('pagination-container');
        if (!data || data.totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '<ul class="pagination">';
        html += `<li class="page-item ${data.first ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadStats(${data.number - 1})">«</a></li>`;
        for (let i = 0; i < data.totalPages; i++) {
            html += `<li class="page-item ${i === data.number ? 'active' : ''}"><a class="page-link" href="#" onclick="loadStats(${i})">${i + 1}</a></li>`;
        }
        html += `<li class="page-item ${data.last ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadStats(${data.number + 1})">»</a></li>`;
        html += '</ul>';
        container.innerHTML = html;
    }

    function applyDateFilter() {
        const d = document.getElementById('filterDate').value;
        if (!d) { alert('請選擇日期'); return; }
        currentDate = d;
        loadStats(0);
    }

    function clearFilter() {
        currentDate = null;
        document.getElementById('filterDate').value = '';
        loadStats(0);
    }

    async function triggerCalculate() {
        const type = document.getElementById('calcType').value;
        const date = document.getElementById('calcDate').value;
        if (!date) { alert('請選擇計算日期'); return; }

        const resultDiv = document.getElementById('calcResult');
        resultDiv.innerHTML = '<div class="text-muted">計算中...</div>';

        const res = await apiFetch('/api/statistics/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, date })
        });
        if (!res) return;

        if (res.status === 201 || res.ok) {
            const data = await res.json();
            const count = Array.isArray(data) ? data.length : '?';
            resultDiv.innerHTML = `<div class="alert alert-success mb-0">✅ 計算完成，共產生 ${count} 筆統計記錄。</div>`;
            loadStats(0);
        } else {
            const err = await res.json().catch(() => ({}));
            resultDiv.innerHTML = `<div class="alert alert-danger mb-0">❌ 計算失敗：${escHtml(err.message || '未知錯誤')}</div>`;
        }
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // 預設帶入今天日期
    document.getElementById('calcDate').value = new Date().toISOString().split('T')[0];

    loadStats();
</script>
</body>
</html>
