<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>庫存管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">📦 庫存管理</h4>
            <button class="btn btn-primary" onclick="openAddModal()">＋ 新增庫存</button>
        </div>

        <!-- 表格 -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>名稱</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="inv-tbody">
                        <tr><td colspan="3" class="text-center py-4 text-muted">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 分頁 -->
        <nav class="mt-3" id="pagination-container"></nav>
    </main>
</div>

<!-- 新增 Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新增庫存項目</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">ID <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputId" placeholder="格式：2 大寫字母 + 6 數字，例如 AF000001"
                           pattern="[A-Z]{2}[0-9]{6}" maxlength="8">
                    <div class="form-text">格式：2 個大寫英文字母 + 6 個數字（共 8 碼）</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputName" placeholder="商品名稱">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveInventory()">儲存</button>
            </div>
        </div>
    </div>
</div>

<!-- 編輯 Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">編輯庫存項目</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" id="editId" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="editName" placeholder="商品名稱">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="updateInventory()">更新</button>
            </div>
        </div>
    </div>
</div>

<!-- 確認刪除 Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">確認刪除</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">確定要刪除「<strong id="deleteName"></strong>」(ID: <span id="deleteIdDisplay"></span>) 嗎？</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">刪除</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/sidebar :: sidebar-active}"></script>
<script>
    let currentPage = 0;
    let deleteId = null;

    const addModal    = new bootstrap.Modal(document.getElementById('addModal'));
    const editModal   = new bootstrap.Modal(document.getElementById('editModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', ...options });
        if (res.status === 401) { location.href = '/login'; return null; }
        return res;
    }

    async function loadInventory(page = 0) {
        currentPage = page;
        const res = await apiFetch(`/api/inventory?page=${page}&size=20&sort=id,asc`);
        if (!res) return;
        const data = await res.json();
        renderTable(data);
        renderPagination(data);
    }

    function renderTable(data) {
        const tbody = document.getElementById('inv-tbody');
        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-muted">無資料</td></tr>';
            return;
        }
        tbody.innerHTML = data.content.map(item => `
            <tr>
                <td><code>${escHtml(item.id)}</code></td>
                <td>${escHtml(item.name)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1"
                        onclick="openEditModal('${escJs(item.id)}', '${escJs(item.name)}')">編輯</button>
                    <button class="btn btn-sm btn-outline-danger"
                        onclick="openDeleteModal('${escJs(item.id)}', '${escJs(item.name)}')">刪除</button>
                </td>
            </tr>`).join('');
    }

    function renderPagination(data) {
        const container = document.getElementById('pagination-container');
        if (!data || data.totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '<ul class="pagination">';
        html += `<li class="page-item ${data.first ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadInventory(${data.number - 1})">«</a></li>`;
        for (let i = 0; i < data.totalPages; i++) {
            html += `<li class="page-item ${i === data.number ? 'active' : ''}"><a class="page-link" href="#" onclick="loadInventory(${i})">${i + 1}</a></li>`;
        }
        html += `<li class="page-item ${data.last ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadInventory(${data.number + 1})">»</a></li>`;
        html += '</ul>';
        container.innerHTML = html;
    }

    function openAddModal() {
        document.getElementById('inputId').value = '';
        document.getElementById('inputName').value = '';
        addModal.show();
    }

    async function saveInventory() {
        const id   = document.getElementById('inputId').value.trim().toUpperCase();
        const name = document.getElementById('inputName').value.trim();
        if (!id || !/^[A-Z]{2}[0-9]{6}$/.test(id)) { alert('ID 格式錯誤，請使用 2 大寫字母 + 6 數字'); return; }
        if (!name) { alert('請輸入名稱'); return; }

        const res = await apiFetch('/api/inventory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, name })
        });
        if (!res) return;
        if (res.ok || res.status === 201) {
            addModal.hide();
            loadInventory(currentPage);
        } else {
            const err = await res.json().catch(() => ({}));
            alert(err.message || '新增失敗');
        }
    }

    function openEditModal(id, name) {
        document.getElementById('editId').value = id;
        document.getElementById('editName').value = name;
        editModal.show();
    }

    async function updateInventory() {
        const id   = document.getElementById('editId').value;
        const name = document.getElementById('editName').value.trim();
        if (!name) { alert('請輸入名稱'); return; }

        const res = await apiFetch(`/api/inventory/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        if (!res) return;
        if (res.ok) {
            editModal.hide();
            loadInventory(currentPage);
        } else {
            const err = await res.json().catch(() => ({}));
            alert(err.message || '更新失敗');
        }
    }

    function openDeleteModal(id, name) {
        deleteId = id;
        document.getElementById('deleteName').textContent = name;
        document.getElementById('deleteIdDisplay').textContent = id;
        deleteModal.show();
    }

    async function confirmDelete() {
        const res = await apiFetch(`/api/inventory/${deleteId}`, { method: 'DELETE' });
        if (!res) return;
        deleteModal.hide();
        loadInventory(currentPage);
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    loadInventory();
</script>
</body>
</html>
