<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hello</title>
</head>
<body>
    <h1>Hello, <span th:text="${userName}">User</span>!</h1>

    <form method="post" action="/hello">
        <label>帳號：<input type="text" name="account" /></label><br/>
        <label>密碼：<input type="password" name="password" /></label><br/>
        <button type="submit">登入</button>
    </form>

    <p th:if="${loginMessage}" th:text="${loginMessage}"
       th:style="${loginSuccess} ? 'color:green' : 'color:red'"></p>

    <table border="1">
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prod : ${allProducts}">
                <td th:text="${prod.name}">Sample Name</td>
                <td th:text="${#numbers.formatDecimal(prod.price, 1, 2)}">0.00</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
