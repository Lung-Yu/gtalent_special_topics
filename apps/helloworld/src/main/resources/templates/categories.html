<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>分類管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">🏷️ 分類管理</h4>
            <button class="btn btn-primary" onclick="openAddModal()">＋ 新增分類</button>
        </div>

        <!-- 類型篩選 -->
        <ul class="nav nav-tabs mb-3" id="typeTab">
            <li class="nav-item">
                <a class="nav-link active" href="#" onclick="filterType(null, this)">全部</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="filterType('INCOME', this)">收入</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="filterType('OUTCOME', this)">支出</a>
            </li>
        </ul>

        <!-- 表格 -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>名稱</th>
                            <th>類型</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="category-tbody">
                        <tr><td colspan="4" class="text-center py-4 text-muted">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 分頁 -->
        <nav class="mt-3" id="pagination-container"></nav>
    </main>
</div>

<!-- 新增/編輯 Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增分類</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">分類名稱</label>
                    <input type="text" class="form-control" id="inputName" placeholder="請輸入名稱">
                </div>
                <div class="mb-3">
                    <label class="form-label">類型</label>
                    <select class="form-select" id="inputType">
                        <option value="INCOME">收入 (INCOME)</option>
                        <option value="OUTCOME">支出 (OUTCOME)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveCategory()">儲存</button>
            </div>
        </div>
    </div>
</div>

<!-- 確認刪除 Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">確認刪除</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                確定要刪除分類「<strong id="deleteName"></strong>」嗎？
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">刪除</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/sidebar :: sidebar-active}"></script>
<script>
    let currentPage = 0;
    let currentType = null;
    let deleteId = null;

    const categoryModal = new bootstrap.Modal(document.getElementById('categoryModal'));
    const deleteModal   = new bootstrap.Modal(document.getElementById('deleteModal'));

    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', ...options });
        if (res.status === 401) { location.href = '/login'; return null; }
        return res;
    }

    async function loadCategories(page = 0) {
        currentPage = page;
        let url = `/api/categories?page=${page}&size=20&sort=name,asc`;
        if (currentType) url += `&type=${currentType}`;
        const res = await apiFetch(url);
        if (!res) return;
        const data = await res.json();
        renderTable(data);
        renderPagination(data);
    }

    function renderTable(data) {
        const tbody = document.getElementById('category-tbody');
        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">無資料</td></tr>';
            return;
        }
        tbody.innerHTML = data.content.map((c, i) => `
            <tr>
                <td>${data.number * data.size + i + 1}</td>
                <td>${escHtml(c.name)}</td>
                <td><span class="badge ${c.type === 'INCOME' ? 'bg-success' : 'bg-danger'}">${c.type === 'INCOME' ? '收入' : '支出'}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${c.id}, '${escJs(c.name)}', '${c.type}')">編輯</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${c.id}, '${escJs(c.name)}')">刪除</button>
                </td>
            </tr>`).join('');
    }

    function renderPagination(data) {
        const container = document.getElementById('pagination-container');
        if (data.totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '<ul class="pagination">';
        html += `<li class="page-item ${data.first ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadCategories(${data.number - 1})">«</a></li>`;
        for (let i = 0; i < data.totalPages; i++) {
            html += `<li class="page-item ${i === data.number ? 'active' : ''}"><a class="page-link" href="#" onclick="loadCategories(${i})">${i + 1}</a></li>`;
        }
        html += `<li class="page-item ${data.last ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadCategories(${data.number + 1})">»</a></li>`;
        html += '</ul>';
        container.innerHTML = html;
    }

    function filterType(type, el) {
        currentType = type;
        document.querySelectorAll('#typeTab .nav-link').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
        loadCategories(0);
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = '新增分類';
        document.getElementById('editId').value = '';
        document.getElementById('inputName').value = '';
        document.getElementById('inputType').value = 'INCOME';
        categoryModal.show();
    }

    function openEditModal(id, name, type) {
        document.getElementById('modalTitle').textContent = '編輯分類';
        document.getElementById('editId').value = id;
        document.getElementById('inputName').value = name;
        document.getElementById('inputType').value = type;
        categoryModal.show();
    }

    async function saveCategory() {
        const id   = document.getElementById('editId').value;
        const name = document.getElementById('inputName').value.trim();
        const type = document.getElementById('inputType').value;
        if (!name) { alert('請輸入名稱'); return; }

        const url    = id ? `/api/categories/${id}` : '/api/categories';
        const method = id ? 'PUT' : 'POST';
        const res = await apiFetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, type })
        });
        if (!res) return;
        if (res.ok) {
            categoryModal.hide();
            loadCategories(currentPage);
        } else {
            const err = await res.json().catch(() => ({}));
            alert(err.message || '操作失敗');
        }
    }

    function openDeleteModal(id, name) {
        deleteId = id;
        document.getElementById('deleteName').textContent = name;
        deleteModal.show();
    }

    async function confirmDelete() {
        const res = await apiFetch(`/api/categories/${deleteId}`, { method: 'DELETE' });
        if (!res) return;
        deleteModal.hide();
        loadCategories(currentPage);
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    loadCategories();
</script>
</body>
</html>
