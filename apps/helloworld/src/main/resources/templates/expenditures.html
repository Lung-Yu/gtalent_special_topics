<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>支出記錄</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main content -->
    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">🧾 支出記錄</h4>
            <button class="btn btn-primary" onclick="openAddModal()">＋ 新增</button>
        </div>

        <!-- 日期篩選 -->
        <div class="card shadow-sm mb-3">
            <div class="card-body py-2 d-flex align-items-center gap-3">
                <label class="fw-semibold mb-0">依日期篩選：</label>
                <input type="date" class="form-control form-control-sm" id="filterDate" style="width:180px">
                <button class="btn btn-sm btn-outline-secondary" onclick="applyDateFilter()">查詢</button>
                <button class="btn btn-sm btn-link text-secondary" onclick="clearDateFilter()">清除篩選</button>
            </div>
        </div>

        <!-- 表格 -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>名稱</th>
                            <th>金額</th>
                            <th>日期</th>
                            <th>付款方式</th>
                            <th>分類</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="exp-tbody">
                        <tr><td colspan="7" class="text-center py-4 text-muted">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 分頁（僅全量查詢時顯示） -->
        <nav class="mt-3" id="pagination-container"></nav>
    </main>
</div>

<!-- 新增支出 Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新增支出記錄</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputName" placeholder="支出項目名稱">
                </div>
                <div class="mb-3">
                    <label class="form-label">金額 <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="inputMoney" min="0" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">付款方式 <span class="text-danger">*</span></label>
                    <select class="form-select" id="inputPayway">
                        <option value="LinePay">LinePay</option>
                        <option value="AppPay">AppPay</option>
                        <option value="GooglePay">GooglePay</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-control" id="inputDate">
                </div>
                <div class="mb-3">
                    <label class="form-label">分類 <span class="text-danger">*</span></label>
                    <select class="form-select" id="inputCategories" multiple size="5">
                        <option disabled>載入中...</option>
                    </select>
                    <div class="form-text">按住 Ctrl（Mac 為 ⌘ Command）可多選；至少選擇一個</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveExpenditure()">儲存</button>
            </div>
        </div>
    </div>
</div>

<!-- 確認刪除 Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">確認刪除</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">確定要刪除「<strong id="deleteName"></strong>」嗎？</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">刪除</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:replace="~{fragments/sidebar :: sidebar-active}"></script>
<script>
    let currentPage = 0;
    let currentDate = null;
    let deleteId = null;

    const addModal    = new bootstrap.Modal(document.getElementById('addModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { credentials: 'include', ...options });
        if (res.status === 401) { location.href = '/login'; return null; }
        return res;
    }

    async function loadExpenditures(page = 0) {
        currentPage = page;
        if (currentDate) {
            await loadByDate(currentDate);
        } else {
            await loadAll(page);
        }
    }

    async function loadAll(page) {
        const res = await apiFetch(`/api/expenditures?page=${page}&size=10&sort=date,desc`);
        if (!res) return;
        const data = await res.json();
        renderTable(data.content);
        renderPagination(data);
    }

    async function loadByDate(date) {
        const res = await apiFetch(`/api/expenditures/by-date?date=${date}`);
        if (!res) return;
        const data = await res.json();
        renderTable(Array.isArray(data) ? data : (data.content || []));
        document.getElementById('pagination-container').innerHTML = '';
    }

    function renderTable(rows) {
        const tbody = document.getElementById('exp-tbody');
        if (!rows || rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">無資料</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map((r, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${escHtml(r.name || r.itemName || '')}</td>
                <td class="text-end fw-semibold">$${(r.money || r.amount || 0).toLocaleString()}</td>
                <td>${r.date || ''}</td>
                <td><span class="badge bg-info text-dark">${escHtml(r.payway || r.paymentMethod || '')}</span></td>
                <td>${(r.categoryNames || []).map(c => `<span class="badge bg-secondary me-1">${escHtml(c)}</span>`).join('') || '<span class="text-muted">—</span>'}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${r.id}, '${escJs(r.name || r.itemName || '')}')">刪除</button>
                </td>
            </tr>`).join('');
    }

    function renderPagination(data) {
        const container = document.getElementById('pagination-container');
        if (!data || data.totalPages <= 1) { container.innerHTML = ''; return; }
        let html = '<ul class="pagination">';
        html += `<li class="page-item ${data.first ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadExpenditures(${data.number - 1})">«</a></li>`;
        for (let i = 0; i < data.totalPages; i++) {
            html += `<li class="page-item ${i === data.number ? 'active' : ''}"><a class="page-link" href="#" onclick="loadExpenditures(${i})">${i + 1}</a></li>`;
        }
        html += `<li class="page-item ${data.last ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadExpenditures(${data.number + 1})">»</a></li>`;
        html += '</ul>';
        container.innerHTML = html;
    }

    function applyDateFilter() {
        const d = document.getElementById('filterDate').value;
        if (!d) { alert('請選擇日期'); return; }
        currentDate = d;
        loadExpenditures(0);
    }

    function clearDateFilter() {
        currentDate = null;
        document.getElementById('filterDate').value = '';
        loadExpenditures(0);
    }

    async function loadCategoryOptions() {
        const sel = document.getElementById('inputCategories');
        sel.innerHTML = '<option disabled>載入中...</option>';
        const res = await apiFetch('/api/categories?size=200&sort=name,asc');
        if (!res) return;
        const data = await res.json();
        sel.innerHTML = (data.content || [])
            .map(c => `<option value="${escHtml(c.name)}">${c.icon ? escHtml(c.icon) + ' ' : ''}${escHtml(c.name)} (${c.type === 'INCOME' ? '收入' : '支出'})</option>`)
            .join('');
    }

    async function openAddModal() {
        document.getElementById('inputName').value = '';
        document.getElementById('inputMoney').value = '0';
        document.getElementById('inputPayway').value = 'LinePay';
        document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
        await loadCategoryOptions();
        addModal.show();
    }

    async function saveExpenditure() {
        const name    = document.getElementById('inputName').value.trim();
        const money   = parseInt(document.getElementById('inputMoney').value, 10);
        const payway  = document.getElementById('inputPayway').value;
        const date    = document.getElementById('inputDate').value;
        const sel     = document.getElementById('inputCategories');
        const categoryNames = Array.from(sel.selectedOptions).map(o => o.value);

        if (!name) { alert('請輸入名稱'); return; }
        if (isNaN(money) || money < 0) { alert('請輸入有效金額'); return; }
        if (categoryNames.length === 0) { alert('請至少選擇一個分類'); return; }

        const body = { name, money, payway, categoryNames };
        if (date) body.date = date;

        const res = await apiFetch('/api/expenditures', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res) return;
        if (res.ok || res.status === 201) {
            addModal.hide();
            loadExpenditures(currentPage);
        } else {
            const err = await res.json().catch(() => ({}));
            alert(err.message || '操作失敗');
        }
    }

    function openDeleteModal(id, name) {
        deleteId = id;
        document.getElementById('deleteName').textContent = name;
        deleteModal.show();
    }

    async function confirmDelete() {
        const res = await apiFetch(`/api/expenditures/${deleteId}`, { method: 'DELETE' });
        if (!res) return;
        deleteModal.hide();
        loadExpenditures(currentPage);
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    loadExpenditures();
</script>
</body>
</html>
