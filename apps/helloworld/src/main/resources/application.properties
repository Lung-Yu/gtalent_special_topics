spring.application.name=helloworld
server.port=8888

# ─────────────────────────────────────────────────────────────────
# Feature Toggle：auth.mode = session（預設）或 jwt
#   session → 啟用 form login + JSESSIONID Session 認證
#   jwt     → 啟用 stateless JWT 認證（POST /auth/login 取 token）
# ─────────────────────────────────────────────────────────────────
app.auth.mode=jwt

# ── JWT 設定（僅 app.auth.mode=jwt 時生效）──────────────────────
# secret 必須 256 bits（32 字元）以上，生產環境請改用環境變數
jwt.secret=gtalent-special-topics-jwt-secret-key-must-be-at-least-256bits
# Token 有效秒數：3600 = 1 小時
jwt.expiration=3600

# MySQL Database Configuration
# Support for environment variables with default values for local development
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:helloworld}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:helloworld}
spring.datasource.password=${DB_PASSWORD:helloworld123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML5